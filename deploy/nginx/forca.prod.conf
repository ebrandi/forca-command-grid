# [FORCA] Command Grid — containerised Nginx (TLS terminator → gunicorn).
# Used by docker-compose.prod.yml. Certificate is mounted at /etc/nginx/certs.

# Don't advertise the exact nginx version in the Server header / error pages — it's
# free recon that helps an attacker pick version-specific exploits.
server_tokens off;

# Per-client request throttle so the auth/login surface and the app generally
# can't be flooded or brute-forced past gunicorn's small worker pool.
limit_req_zone $binary_remote_addr zone=forca_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=forca_app:10m rate=30r/s;
# Separate, far more generous budget for the EVE-image proxy: a single killboard
# page (battle reports, fits) legitimately pulls dozens-to-hundreds of immutable,
# cache-served images at once, so they must NOT share the app's 30r/s budget — at
# that rate a normal page load tripped limit_req's 503s. These are cheap on a cache
# hit; the limit only exists to bound cache-miss fan-out to CCP's image server.
limit_req_zone $binary_remote_addr zone=forca_img:10m rate=300r/s;

# --- AI/LLM + SEO crawler control ------------------------------------------
# The only anonymous surface is the public killboard, whose click-to-drill-down
# filters (?character_id=&ship_type_id=&system_id=&side=… ) form an effectively
# infinite URL space. AI/SEO crawlers enumerate it exhaustively — every URL is a
# unique cache-miss that runs a fresh aggregate over the 5.5M-row participant
# table, pinning gunicorn + Postgres while real users generate almost nothing.
# robots.txt (served below) asks compliant crawlers to skip query-string URLs,
# but that's advisory + delayed; this map is the real-time backstop.
#
# Classify known AI-training / AI-search / SEO crawlers by User-Agent.
map $http_user_agent $forca_ai_crawler {
    default 0;
    "~*(GPTBot|OAI-SearchBot|ChatGPT-User|ClaudeBot|Claude-Web|anthropic-ai|Amazonbot|Bytespider|CCBot|PerplexityBot|meta-externalagent|FacebookBot|cohere-ai|Diffbot|ImagesiftBot|Omgilibot|YouBot|DataForSeoBot|MJ12bot|SemrushBot|AhrefsBot|DotBot|Timpibot|Scrapy)" 1;
}
# A killboard drill-down = a /killboard/ path that carries a query string. The
# bare canonical pages (no "?") stay fully crawlable.
map $request_uri $forca_faceted {
    default 0;
    # /killboard, with or without a trailing slash, that carries a query string.
    # Bare canonical pages and detail pages (/killboard/<id>, no "?") never match.
    "~*^/killboard(/[^?]*)?\?." 1;
}
# Block only the intersection: an AI/SEO crawler fetching a faceted killboard URL.
map "$forca_ai_crawler$forca_faceted" $forca_block_crawl {
    default 0;
    "11" 1;
}

# Disk cache for the EVE-image proxy (/eveimg). Images are immutable per id+size,
# so cache them hard and let the volume persist across restarts.
proxy_cache_path /var/cache/nginx/eveimg levels=1:2 keys_zone=eveimg:10m
                 max_size=2g inactive=30d use_temp_path=off;

server {
    listen 80 default_server;
    server_name _;
    # Scanners/monitors hitting the bare IP aren't real users — drop them instead of
    # bouncing an IP-host redirect around. Real traffic always uses the domain.
    if ($host ~ "^\d{1,3}(\.\d{1,3}){3}$") { return 444; }
    # Redirect all plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Requests whose Host is the bare IP address (port scanners, uptime probes hitting
    # the raw IP) are dropped at the edge with 444 so they never reach Django and log a
    # DisallowedHost stack trace. This is defence-in-depth beside Django's ALLOWED_HOSTS
    # (which stays authoritative); it also saves a gunicorn round-trip and log volume.
    if ($host ~ "^\d{1,3}(\.\d{1,3}){3}$") { return 444; }

    ssl_certificate     /etc/nginx/certs/forca.crt;
    ssl_certificate_key /etc/nginx/certs/forca.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Edge security headers (belt-and-suspenders alongside Django's middleware;
    # also cover responses nginx serves directly, e.g. error pages).
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # The SSO/login flow is the brute-force-sensitive surface: throttle it harder.
    location /auth/ {
        limit_req zone=forca_login burst=10 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # EVE imagery. Type icons/renders are a finite, static set, so they are
    # mirrored to disk (`mirror_type_images` → eveimg_data volume) and served
    # straight from the filesystem — no CCP dependency at request time and nothing
    # to rate-limit. Anything not on disk (a brand-new type, an uncommon size, and
    # the inherently dynamic portraits / corp / alliance logos) falls back to the
    # CCP image-server proxy-cache below.
    #
    # Type images: try the local mirror first, then the proxy. The mirror stores
    # files as /srv/eveimg/types/{id}/{kind}-{size}.{png,jpg}; the request is
    # /eveimg/types/{id}/{kind}?size=N, so we append "-{size}.{ext}" to $uri.
    location ^~ /eveimg/types/ {
        root /srv;
        try_files $uri-$arg_size.png $uri-$arg_size.jpg @eveimg_upstream;
        # Static-file responses don't inherit server-level add_header — re-assert.
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Image-Source "mirror" always;
        expires 30d;
    }

    # Portraits, corp & alliance logos (per-entity, mutable) have no local mirror —
    # send them straight to the proxy. The bogus try_files target never exists, so
    # every request falls through to the upstream named location.
    location ^~ /eveimg/ {
        root /srv;
        try_files /eveimg/__never__ @eveimg_upstream;
    }

    # The CCP image-server proxy + edge cache, used as the fallback for both above.
    location @eveimg_upstream {
        # Dedicated image budget (see forca_img above): burst high enough to absorb
        # the most image-dense page in one shot, then 300r/s sustained.
        limit_req zone=forca_img burst=1200 nodelay;
        # Docker's embedded DNS, re-resolved periodically so a CDN IP rotation on
        # images.evetech.net doesn't strand a stale address baked in at startup.
        resolver 127.0.0.11 valid=300s ipv6=off;
        set $eveimg_host images.evetech.net;
        # Strip the /eveimg/ prefix and forward the rest to the CCP image server.
        rewrite ^/eveimg/(.*)$ /$1 break;
        proxy_pass https://$eveimg_host;
        proxy_ssl_server_name on;
        # Authenticate CCP's TLS certificate on the upstream leg: without this nginx's
        # default is proxy_ssl_verify off, so an on-path attacker could inject image
        # bytes that then get cached (up to 30d) and served same-origin. The CA bundle
        # ships in the nginx:alpine image at this path.
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify_depth 2;
        proxy_set_header Host       images.evetech.net;
        proxy_set_header User-Agent $http_user_agent;

        # When CCP has no image for a type (404, or 400 "bad category or variation"
        # — e.g. a blueprint has no icon), serve a neutral "N/A" placeholder instead
        # of a broken image. Only these permanent statuses are intercepted; 5xx
        # still surface so a transient CCP blip isn't masked as "no image".
        proxy_intercept_errors on;
        error_page 400 404 = @eveimg_placeholder;

        proxy_cache eveimg;
        proxy_cache_key $uri$is_args$args;
        proxy_cache_valid 200 301 302 30d;
        proxy_cache_valid 404 1h;
        proxy_cache_valid any 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        # Upstream cookies/cache directives must not interfere with our caching.
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        proxy_hide_header Set-Cookie;
        # nginx does NOT inherit the server-level add_header directives into a
        # location that declares its own, so re-assert the security headers here —
        # nosniff in particular matters on a same-origin path serving proxied
        # third-party bytes.
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=2592000" always;
        expires 30d;
    }

    # Neutral "N/A" square for type images CCP has no icon/render for. Served as a
    # 200 so the browser renders it like any other image (a scalable SVG, so one
    # file fits every requested size).
    location @eveimg_placeholder {
        root /etc/nginx;
        try_files /eveimg-placeholder.svg =404;
        default_type image/svg+xml;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Image-Source "placeholder" always;
        add_header Cache-Control "public, max-age=86400" always;
        expires 1d;
    }

    # Public crawl policy. Canonical pages are crawlable; every query-string URL
    # (the killboard's faceted drill-downs) is off-limits so compliant crawlers
    # don't wander into the infinite filter space. Served straight from nginx so
    # it never touches gunicorn.
    location = /robots.txt {
        default_type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 "User-agent: *\nDisallow: /*?\nCrawl-delay: 30\n";
    }

    location / {
        # Real-time backstop for crawlers that ignore robots.txt: an AI/SEO bot
        # hitting a faceted /killboard/?… URL gets 429 (retryable) instead of a
        # multi-core aggregate. Bare killboard pages still return 200 to them.
        if ($forca_block_crawl) {
            add_header Retry-After 86400 always;
            # add_header in an `if` replaces (not merges) inheritance, so re-assert
            # the edge security headers on the 429.
            add_header X-Content-Type-Options    "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            return 429;
        }
        limit_req zone=forca_app burst=60 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
