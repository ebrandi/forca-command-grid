# Lint + test on every push and pull request.
#
# The repo carries ~2,350 tests but nothing ran them on incoming changes, so a PR
# from an external contributor could not be evaluated automatically. This workflow
# is the gate: ruff for style/security lint (the `S` ruleset is enabled in
# pyproject.toml), then the full pytest suite against a real PostgreSQL, which the
# test settings require.
#
# Actions are pinned to a full commit SHA, not a tag: a tag is mutable and can be
# repointed at malicious code by a compromised maintainer account.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read           # least privilege: this job only reads the repo

concurrency:
  # A newer push to the same ref makes an in-flight run redundant.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.7,<0.13"
      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forca
          POSTGRES_USER: forca
          # Throwaway credential for an ephemeral CI container that is never
          # reachable off the runner. Not a secret.
          POSTGRES_PASSWORD: forca
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forca -d forca"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://forca:forca@localhost:5432/forca
      DJANGO_SECRET_KEY: ci-only-not-a-real-secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Install gettext (msgfmt, for catalogue compilation)
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Django system check
        run: python manage.py check
      - name: Compile message catalogues
        # Fails the build on a malformed .po — a broken locale must never ship silently
        # (docs/i18n/design/11-catalogue-maintenance.md).
        #
        # The other two i18n gates run inside `pytest` below, so they need nothing here:
        #   * catalogue freshness — tests/test_i18n_catalogue_freshness.py re-extracts into a
        #     scratch tree and compares the (msgctxt, msgid) SET, so a string marked in the code
        #     but never extracted fails the build. Comparing identities rather than file bytes is
        #     what makes it immune to the gettext-version formatting drift that kept this gate
        #     deferred. It needs the gettext installed above.
        #   * terminology — tests/test_i18n_terminology.py lints every committed catalogue against
        #     core/i18n/data/protected-terms.yml.
        run: python manage.py compilemessages
      - name: Run tests
        run: pytest -q

  # Django's own deployment checklist, run against config.settings.prod with
  # throwaway-but-realistic secrets. This currently passes with zero warnings; the job
  # exists so it keeps doing so. `--fail-level WARNING` makes a new warning a red build.
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: check --deploy against production settings
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_ALLOWED_HOSTS: grid.example.com
          # Not secrets: generated per-run, used only to satisfy the settings module.
          # SECRET_KEY must exceed 50 chars or security.W009 fires.
          DATABASE_URL: postgres://forca:forca@localhost:5432/forca
          ESI_USER_AGENT: "forca-command-grid/ci (ci@example.invalid)"
        run: |
          export DJANGO_SECRET_KEY="$(openssl rand -base64 50 | tr -d '\n')"
          export TOKEN_ENCRYPTION_KEY="$(openssl rand -base64 32 | tr '+/' '-_')"
          python manage.py check --deploy --fail-level WARNING
