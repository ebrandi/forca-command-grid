# Secret scanning (gitleaks).
#
# Catches accidentally-committed credentials — API keys, tokens, private keys,
# passwords — before they reach a public branch. Unlike the pip-audit workflow,
# this MUST run on every push and pull request regardless of which files changed
# (a secret can land in any file), so it is deliberately NOT path-filtered.
#
# What it scans:
#   - pull_request / push: the incoming commits.
#   - schedule + workflow_dispatch: the full history (fetch-depth: 0), a periodic
#     backstop in case a secret slipped in before this workflow existed.
#
# The app's own config keeps secrets out of the tree by design (everything is read
# from environment variables / encrypted-at-rest console rows; .env is git-ignored).
# This workflow is the automated safety net that enforces that discipline over time.
#
# Hardening: every `uses:` is pinned to a full commit SHA. A tag is mutable and can
# be repointed at malicious code by a compromised maintainer account.

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 6 * * 1"   # Mondays 06:30 UTC, alongside the dependency scan
  workflow_dispatch: {}

permissions:
  contents: read           # least privilege: the job only needs to read the repo
  pull-requests: read      # on pull_request, gitleaks-action lists the PR's commits
                           # via GET /pulls/{n}/commits; without this scope that call
                           # 403s and the job fails. A permissions block denies every
                           # scope it does not name, so this must be explicit.

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls the full history so gitleaks can scan every commit,
      # not just the tip. persist-credentials: false — this job only reads the
      # repo, so don't leave the checkout token in .git/config for a later step.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          # No GITLEAKS_LICENSE needed: it is required for organization-owned repos,
          # not for repos owned by a personal account. Transferring this repo to an
          # organization would require adding one.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
