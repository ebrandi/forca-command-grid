{% load i18n %}
{# Shared avoidance controls: avoid systems / regions + incursions. #}
<div class="grid gap-3 sm:grid-cols-2">
  <div>
    <label class="label" for="lf_avoid_sys_1">{% translate "Avoid systems" %} <span class="text-faint">{% translate "(comma-separated)" %}</span></label>
    <input id="lf_avoid_sys_1" type="text" name="avoid_sys" value="{{ avoid_sys }}" placeholder="e.g. Tama, Rancer" autocomplete="off" class="input-field">
  </div>
  <div>
    <label class="label" for="lf_avoid_region_2">{% translate "Avoid regions" %}</label>
    <input id="lf_avoid_region_2" type="text" name="avoid_region" value="{{ avoid_region }}" placeholder="e.g. Providence" autocomplete="off" class="input-field">
  </div>
</div>
<label class="mt-2 flex items-center gap-2 text-sm text-muted">
  <input type="checkbox" name="avoid_incursions" value="1" {% if avoid_incursions %}checked{% endif %}> {% translate "Avoid incursion systems" %}
</label>
{% if unresolved %}<p class="mt-1 text-[11px] text-loss">{% blocktranslate with names=unresolved|join:", " %}Couldn't find: {{ names }} — check spelling.{% endblocktranslate %}</p>{% endif %}
